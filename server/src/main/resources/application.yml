server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/agritainment?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: zhangkun
    password: 138992
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
  type-enums-package: com.agritainment.enums

jwt:
  secret: agritainment-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 604800000

app:
  sms:
    dev-code: "123456"
  upload:
    path: ./uploads
    max-size: 10MB
  cors:
    allowed-origins: "*"
  wechat:
    mini-program:
      appid: ${WECHAT_APPID:your-appid-here}
      secret: ${WECHAT_SECRET:your-secret-here}
      template:
        reservation-created: ${WECHAT_TPL_RESERVATION_CREATED:}
        reservation-cancelled: ${WECHAT_TPL_RESERVATION_CANCELLED:}
        service-order-created: ${WECHAT_TPL_SERVICE_ORDER_CREATED:}

logging:
  level:
    com.agritainment: DEBUG
